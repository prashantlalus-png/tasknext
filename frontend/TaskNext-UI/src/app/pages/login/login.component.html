<div class="container py-5" style="max-width: 480px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h3 class="mb-3 text-primary">TaskNext Login</h3>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <form (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input class="form-control" [(ngModel)]="email" name="email" type="email" placeholder="email@example.com" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" [(ngModel)]="password" name="password" type="password" placeholder="********" required />
        </div>

        <button class="btn btn-primary w-100" [disabled]="loading || !email || !password">
          {{ loading ? 'Signing in...' : 'Login' }}
        </button>
      </form>

      <div class="text-center mt-3">
        <p>Don't have an account? <a routerLink="/register" class="text-decoration-none">Create an account</a></p>
      </div>
    </div>
  </div>
</div>
